name: Deploy demo to GitHub Pages

# Builds the static demo (library -> demo `nuxt generate`) and deploys it to GitHub Pages.
# Model + dataset publishing to Hugging Face is a manual, local step - it needs write tokens and
# is deliberately kept out of CI.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - run: npm ci
      # Build the library first - the demo consumes its dist.
      - run: npm run build -w frontend-agent
      # Project Pages serve under /<repo>/; for a user/org root site set this to '/'.
      - run: npm run generate -w demo
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: demo/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
