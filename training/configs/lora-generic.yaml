# LoRA on a mid-range card (bf16, no 4-bit quant). Faster than full FT, higher fidelity than QLoRA.
# Merge the adapter into base weights before GGUF export.
method: lora
dtype: bf16
epochs: 2.0
batch_size: 4
grad_accum: 4
max_len: 2560
optim: adamw_torch
grad_checkpointing: false
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
