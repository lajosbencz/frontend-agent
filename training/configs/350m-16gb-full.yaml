# LFM2.5-350M full fine-tune on 16GB. Larger than 230M -> grad_checkpointing MANDATORY and
# batch 1 / accum 16 (eff batch 16, matches champion). fp32 for precision parity with the 230M
# runs; if it OOMs at max_len 2560, drop dtype to bf16 (halves activations/grads) before trimming
# max_len (multi-turn sessions need the length). Keep completion_only ON via TRAIN_COMPLETION_ONLY_LOSS.
model: LiquidAI/LFM2.5-350M
method: full
dtype: fp32
epochs: 1.3
batch_size: 1
grad_accum: 16
eval_batch_size: 1
max_len: 2560
optim: paged_adamw_32bit
grad_checkpointing: true
