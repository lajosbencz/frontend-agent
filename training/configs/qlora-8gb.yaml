# QLoRA on an 8GB card: 4-bit NF4 base + LoRA adapters, paged 8-bit optimizer, grad-checkpointing on.
# Trains a fraction of the params; lower fidelity than full fp32 but fits small GPUs.
method: qlora
dtype: bf16
epochs: 2.0
batch_size: 4
grad_accum: 4
eval_batch_size: 1
max_len: 2048
optim: paged_adamw_8bit
grad_checkpointing: true
lora_r: 16
lora_alpha: 32
