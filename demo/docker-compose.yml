# Local dev behind the shared Traefik (podman): `npm run dev` routed by PathPrefix(`/demo`) on the
# websecure (https:8443) entrypoint with Traefik's self-signed cert, so the page is a secure,
# cross-origin-isolated context (SharedArrayBuffer -> multi-threaded wllama). Uses the repo's
# host-installed node_modules (node:24 matches the host ABI), so no in-container install. Static /
# GitHub Pages builds go through `npm run generate` + .github/workflows/pages.yml instead.
services:
  demo:
    image: docker.io/library/node:24
    container_name: frontend-agent-demo
    restart: unless-stopped
    working_dir: /repo/demo
    command: npm run dev
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_APP_BASE_URL: /demo/
    volumes:
      - ..:/repo
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo.rule=PathPrefix(`/demo`)
      - traefik.http.routers.demo.entrypoints=websecure
      - traefik.http.routers.demo.tls=true
      - traefik.http.services.demo.loadbalancer.server.port=3000
    networks:
      - traefik

networks:
  traefik:
    external: true
