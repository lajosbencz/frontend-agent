# Static host for the prerendered demo. COOP/COEP make the page crossOriginIsolated so wllama can
# use SharedArrayBuffer (multi-thread WASM); everything is same-origin so it loads fine under COEP.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # crossOriginIsolated - set on every response; nginx's `always` emits them on errors too.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # NB: do NOT declare a `types {}` block here - it replaces nginx's whole mime.types map
    # (breaking text/html and application/wasm). The default map + default_type
    # (application/octet-stream) already covers .html, .wasm, and .gguf correctly.
    sendfile on;
    # prerendered routes are <route>.html; fall back through dir and .html before the SPA shell
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
