# Serves the prerendered static demo (demo/.output/public) behind a shared Traefik front, over TLS
# on the websecure:8443 entrypoint at https://example.localhost:8443.
# Rebuild the site with `npm run generate` (from demo/), then `podman compose up -d` here.
name: frontend-agent-demo

services:
  demo:
    image: docker.io/nginx:alpine
    restart: unless-stopped
    volumes:
      - ../.output/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik
    labels:
      - traefik.enable=true
      # 8443/websecure is dedicated to this demo, so match ANY host - lets remote clients reach it
      # by the server's real address (LAN IP, tailscale IP, or a real hostname). A `.localhost`
      # name can't be used remotely (it always resolves to the client's own loopback).
      - traefik.http.routers.brewcraft.rule=PathPrefix(`/`)
      - traefik.http.routers.brewcraft.entrypoints=websecure
      - traefik.http.routers.brewcraft.tls=true
      - traefik.http.services.brewcraft.loadbalancer.server.port=80

networks:
  traefik:
    external: true
